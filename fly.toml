# fly.toml app configuration file generated for mta-api-restless-pond-4321 on 2026-03-29T21:37:53-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mta-api-restless-pond-4321'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/mta.db'
  PORT = '3000'

[[mounts]]
  source = 'mta_data'
  destination = '/data'
  processes = ['app']

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
