# fly.toml app configuration file generated for mta-api-restless-pond-4321 on 2026-03-29T21:37:53-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mta-api-restless-pond-4321'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/mta.db'
  HOST = '0.0.0.0'
  PORT = '3000'

[[mounts]]
  source = 'mta_data'
  destination = '/data'
  processes = ['app']

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Run 2+ machines for resilience: a host failure or a rolling deploy leaves at
  # least one instance serving. Each machine owns its own volume/DB, so they are
  # independent read replicas — no shared state to coordinate.
  min_machines_running = 2

  # /health is a readiness probe: it returns 503 while an instance is still
  # seeding its (empty) DB, so the LB won't route to a not-ready machine.
  # 60s is Fly's max grace for HTTP checks — it can't cover a first-boot seed
  # (~2-3 min on a fresh volume), so provision new machines/volumes OUT of the
  # deploy path (`fly scale count` / `machine clone`) and let them seed while
  # unhealthy/out-of-rotation. Redeploys of a populated volume go 200 instantly.
  # /health reads only in-memory state (no SQLite), so it responds in well under a
  # second even while a background sync saturates the shared vCPU. The 10s timeout
  # is headroom for GC/cold pauses, not for query latency.
  [[http_service.checks]]
    interval     = '15s'
    timeout      = '10s'
    grace_period = '60s'
    method       = 'get'
    path         = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'