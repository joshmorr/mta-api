# fly.toml app configuration file generated for mta-api-restless-pond-4321 on 2026-03-29T21:37:53-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mta-api-restless-pond-4321'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/mta.db'
  HOST = '0.0.0.0'
  PORT = '3000'

[[mounts]]
  source = 'mta_data'
  destination = '/data'
  processes = ['app']

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm so cold starts don't repeatedly re-fire the static
  # feed sync (which now runs off-thread but still burns bandwidth/CPU).
  min_machines_running = 1

  # /health responds instantly even during a sync (sync runs on a worker thread),
  # so Fly can detect and restart a genuinely wedged machine.
  [[http_service.checks]]
    interval     = '15s'
    timeout      = '5s'
    grace_period = '30s'
    method       = 'get'
    path         = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'